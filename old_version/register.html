<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Trans Jogja - Buat Akun Penumpang</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#191c1e",
                        "primary": "#00342b",
                        "surface-variant": "#e0e3e5",
                        "secondary": "#006c49",
                        "on-surface-variant": "#3f4945",
                        "background": "#f7f9fb",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#707975",
                        "surface-container-low": "#f2f4f6",
                        "on-primary": "#ffffff",
                        "outline-variant": "#bfc9c4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "card-padding": "24px",
                        "margin": "32px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"],
                        "title-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "title-lg": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .batik-bg {
            background-color: #f7f9fb;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 52, 43, 0.03) 2px, transparent 2px), radial-gradient(circle at 0% 100%, rgba(0, 52, 43, 0.03) 2px, transparent 2px);
            background-size: 40px 40px;
        }
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #006c49;
            background-color: white;
            padding: 0 4px;
        }
    </style>
</head>
<body class="batik-bg min-h-screen flex flex-col justify-center items-center text-on-surface font-body-md bg-background py-margin">
<main class="w-full max-w-[480px] px-4 md:px-0 z-10">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,77,64,0.05)] border border-outline-variant/30 overflow-hidden relative">
<div class="p-card-padding border-b border-surface-variant flex flex-col items-center text-center relative overflow-hidden">
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-xl pointer-events-none"></div>
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mb-4 text-on-primary shadow-sm">
<span class="material-symbols-outlined text-3xl">directions_bus</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-1">Trans Jogja</h1>
<h2 class="font-title-lg text-title-lg text-on-surface-variant">Buat Akun Penumpang</h2>
<p class="font-body-md text-body-md text-outline mt-2">Daftar untuk merencanakan perjalanan Anda dengan mudah.</p>
</div>
<div class="p-card-padding">
<form onsubmit="handleRegister(event)" class="flex flex-col gap-unit">
<div class="relative input-group mt-2">
<input class="block w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-transparent appearance-none focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary transition-colors peer font-body-md text-body-md text-on-surface placeholder-transparent" id="fullname" name="fullname" placeholder=" " required="" type="text"/>
<label class="absolute top-3 left-4 font-body-md text-body-md text-outline transition-all duration-200 pointer-events-none peer-focus:text-secondary peer-focus:-translate-y-6 peer-focus:scale-85 peer-focus:bg-white peer-focus:px-1" for="fullname">Nama Lengkap</label>
</div>
<div class="relative input-group mt-4">
<input class="block w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-transparent appearance-none focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary transition-colors peer font-body-md text-body-md text-on-surface placeholder-transparent" id="email" name="email" placeholder=" " required="" type="email"/>
<label class="absolute top-3 left-4 font-body-md text-body-md text-outline transition-all duration-200 pointer-events-none peer-focus:text-secondary peer-focus:-translate-y-6 peer-focus:scale-85 peer-focus:bg-white peer-focus:px-1" for="email">Email</label>
</div>
<div class="relative input-group mt-4">
<input class="block w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-transparent appearance-none focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary transition-colors peer font-body-md text-body-md text-on-surface placeholder-transparent" id="phone" name="phone" placeholder=" " required="" type="tel"/>
<label class="absolute top-3 left-4 font-body-md text-body-md text-outline transition-all duration-200 pointer-events-none peer-focus:text-secondary peer-focus:-translate-y-6 peer-focus:scale-85 peer-focus:bg-white peer-focus:px-1" for="phone">Nomor Telepon</label>
</div>
<div class="relative input-group mt-4">
<input class="block w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-transparent appearance-none focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary transition-colors peer font-body-md text-body-md text-on-surface placeholder-transparent pr-10" id="password" name="password" placeholder=" " required="" type="password"/>
<label class="absolute top-3 left-4 font-body-md text-body-md text-outline transition-all duration-200 pointer-events-none peer-focus:text-secondary peer-focus:-translate-y-6 peer-focus:scale-85 peer-focus:bg-white peer-focus:px-1" for="password">Kata Sandi</label>
<button aria-label="Toggle password visibility" class="absolute right-3 top-3 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<div class="flex items-start gap-3 mt-4">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 bg-surface-container-lowest cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="text-sm">
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="terms">
                                Saya menyetujui <a class="text-secondary hover:underline font-semibold" href="#">Syarat &amp; Ketentuan</a> serta <a class="text-secondary hover:underline font-semibold" href="#">Kebijakan Privasi</a> Trans Jogja.
                            </label>
</div>
</div>
<button class="mt-6 w-full bg-primary hover:bg-[#004d40] text-on-primary font-label-md text-label-md py-3 px-4 rounded-DEFAULT transition-colors shadow-sm active:scale-[0.98] duration-200 flex justify-center items-center gap-2" type="submit">
                        Daftar
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
</div>
<div class="p-4 bg-surface-container-low border-t border-surface-variant text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Sudah punya akun? 
                    <a class="text-secondary font-semibold hover:underline ml-1" href="login.html">Masuk di sini</a>
</p>
</div>
</div>
<footer class="mt-8 text-center">
<p class="font-body-md text-body-md text-outline text-sm">
                © 2024 Trans Jogja Management System.<br/>Inspired by Yogyakarta Heritage.
            </p>
</footer>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const togglePasswordBtn = document.querySelector('button[aria-label="Toggle password visibility"]');
            const passwordInput = document.getElementById('password');
            const icon = togglePasswordBtn.querySelector('.material-symbols-outlined');

            if(togglePasswordBtn && passwordInput && icon) {
                togglePasswordBtn.addEventListener('click', () => {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    icon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
                });
            }
        });

        function handleRegister(e) {
            e.preventDefault();
            alert("Pendaftaran berhasil! Mengarahkan ke halaman login...");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
